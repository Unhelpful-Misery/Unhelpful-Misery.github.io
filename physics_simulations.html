<script defer>
    function convertVHToPixels(VH) {    
        return VH * (document.documentElement.clientWidth / 100);
    }
    const dotsNav = document.querySelector('.carousel_nav');
    const dots = Array.from(dotsNav.children);
    let currentSlide = 1;
    function goRight() {
        document.querySelector(".carousel").scrollLeft += convertVHToPixels(102.8);
        if (currentSlide != 9) {
            currentSlide++;
        }
        document.getElementById("navButton" + currentSlide.toString()).className = "carousel_indicator current-slide";
        document.getElementById("navButton" + (currentSlide-1).toString()).className = "carousel_indicator";
    }
    function goLeft() {
        document.querySelector(".carousel").scrollLeft -= convertVHToPixels(102.8);
        if (currentSlide != 1) {
            currentSlide--;
        }
        document.getElementById("navButton" + (currentSlide).toString()).className = "carousel_indicator current-slide";
        document.getElementById("navButton" + (currentSlide+1).toString()).className = "carousel_indicator";
    }
    function navButton(n) {
        document.querySelector(".carousel").scrollTo(n*convertVHToPixels(102.8),0);
        document.getElementById("navButton" + currentSlide.toString()).className = "carousel_indicator";
        currentSlide=n;
        document.getElementById("navButton" + currentSlide.toString()).className = "carousel_indicator current-slide";
    }
</script>

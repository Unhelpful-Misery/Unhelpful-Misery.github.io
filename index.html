<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (localStorage.getItem('preferredCSSMode') === 'modernCSS') {
      window.location.replace('/modernCSS/home');
    }
    if (localStorage.getItem('preferredCSSMode') === 'lessCSS') {
      window.location.replace('/lessCSS/home');
    }
    if (localStorage.getItem('preferredCSSMode') === 'noCSS') {
      window.location.replace('/noCSS/home');
    }
    else {
      window.location.replace('/modernCSS/home');
    }
  </script>
</head>
<body>
  <p>
    If you're seeing this page, something went wront with my website's redirect! 
    <a href='/modernCSS/home'>Please click here to be redirected to the main page.</a>
  </p>
</body>
</html>

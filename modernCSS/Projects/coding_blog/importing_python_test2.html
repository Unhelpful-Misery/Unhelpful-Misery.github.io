<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>PyScript with CSV</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <script type="py-config">
        [[fetch]]
        files = ["/assets/code-files/american-units/Units - Sheet1.csv"]
    </script>
</head>
<body>

    <h2>Search Box</h2>
    <input type="text" id="searchBar" placeholder="Type something...">
    <button id="submitBtn">Submit</button>

    <h3>Result:</h3>
    <div id="outputResult">Waiting for input...</div>

    <script type="py">
        import pyodide
        from pyscript import document
        import csv 

        def my_complicated_function(user_input):
            with open("Units - Sheet1.csv", mode="r") as file:
                reader = csv.reader(file)
                return reader[0]
                        
            return "No match found in CSV."

        def process_data(event):
            user_input = document.querySelector("#searchBar").value
            result = my_complicated_function(user_input)
            document.querySelector("#outputResult").innerText = result

        try:
            button = document.querySelector("#submitBtn")
            click_proxy = pyodide.ffi.create_proxy(process_data)
            button.addEventListener("click", click_proxy)
        except Exception as e:
            print(f"Error binding button: {e}")
    </script>

</body>
</html>
